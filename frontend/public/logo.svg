<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Green rounded square background -->
  <rect x="0" y="0" width="256" height="256" rx="48" fill="#22c55e"/>
  
  <!-- Car outline -->
  <g transform="translate(128, 128)">
    <!-- Car body -->
    <path d="M -45 -15 Q -45 -25 -35 -25 L 25 -25 Q 35 -25 35 -15 L 35 10 Q 35 20 25 20 L -25 20 Q -35 20 -35 10 Z" 
          fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Front wheel -->
    <circle cx="-20" cy="25" r="10" fill="none" stroke="white" stroke-width="3"/>
    
    <!-- Rear wheel -->
    <circle cx="20" cy="25" r="10" fill="none" stroke="white" stroke-width="3"/>
    
    <!-- Windows -->
    <rect x="-28" y="-18" width="16" height="12" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <rect x="12" y="-18" width="16" height="12" rx="2" fill="none" stroke="white" stroke-width="2"/>
  </g>
</svg>